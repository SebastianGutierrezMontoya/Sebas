</nav>

<div class="mobile-drawer" id="mobileDrawer">
  <div class="mobile-drawer-header">
    <span class="mobile-drawer-title">Menú</span>
    <button class="mobile-drawer-close" onclick="toggleMobileMenu()">&times;</button>
  </div>
  <div class="mobile-drawer-search">
    <form method="GET" action="catalogo">
      <input type="text" name="prod_nombre" class="mobile-search-input" placeholder="Buscar productos..." aria-label="Buscar productos" />
      <button type="submit" class="mobile-search-btn">Buscar</button>
    </form>
  </div>
  <div class="mobile-drawer-links">
    <a class="mobile-link" href="home" onclick="closeMobileMenu()">Inicio</a>
    <a class="mobile-link" href="catalogo" onclick="closeMobileMenu()">Catálogo</a>
    <a *ngIf="isAuthenticated" class="mobile-link" href="mis_pedidos" onclick="closeMobileMenu()">Mis Pedidos</a>
    <div *ngIf="isAuthenticated" class="mobile-divider"></div>
    <div *ngIf="isAuthenticated" class="mobile-user-info">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      <span>{{ usuario?.nombre || usuario?.id_usuario }}</span>
    </div>
    <a *ngIf="isAuthenticated" class="mobile-link mobile-link-logout" href="logout" onclick="closeMobileMenu()">Cerrar Sesión</a>
    <a *ngIf="!isAuthenticated" class="mobile-link mobile-link-login" href="login" onclick="closeMobileMenu()">Iniciar Sesión</a>
    <a *ngIf="!isAuthenticated" class="mobile-link mobile-link-register" href="register" onclick="closeMobileMenu()">Crear Cuenta</a>

    <div *ngIf="hasPermissions$" class="mobile-divider"></div>
    <a *ngIf="hasPermissions$" class="mobile-link" href="panel_dashboard" onclick="closeMobileMenu()">Gestión</a>

  </div>
</div>
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

<script>
function toggleMobileMenu() {
  document.getElementById('mobileDrawer').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('open');
  document.body.classList.toggle('no-scroll');
}

function closeMobileMenu() {
  document.getElementById('mobileDrawer').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('open');
  document.body.classList.remove('no-scroll');
}
</script>
