<div id="cart-overlay" onclick="toggleCart()"></div>

<div id="cart-sidebar">

  <div class="cart-sidebar-header">
    <div>
      <h2 class="cart-sidebar-title">Pedido</h2>
      <p class="cart-sidebar-subtitle">Resumen de selección</p>
    </div>
    <button onclick="toggleCart()" class="cart-close-btn">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div id="cart-items" class="cart-items-list">
    <div class="cart-empty">
      <i class="fas fa-shopping-bag"></i>
      <p>Carrito vacío</p>
    </div>
  </div>

  <div class="cart-sidebar-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Total estimado</span>
      <span id="cart-total">$ 0</span>
    </div>

    <form method="post" action="" id="checkout-form">


      <div id="cart-data" style="display:none;">
        <input type="hidden" name="cart_items_json" id="cart_items_input">
        <input type="hidden" name="cart_quantity" id="cart_quantity_input">
        <input type="hidden" name="cart_total" id="cart_total_input">
        <input type="hidden" name="ped_direccion_envio" id="ped_direccion_envio_input">
        <input type="hidden" name="ped_notas" id="ped_notas_input">
        <input type="hidden" name="nombre_invitado" id="nombre_invitado_input">
        <input type="hidden" name="telefono_invitado" id="telefono_invitado_input">
      </div>


      <button *ngIf="isAuthenticated" type="button" class="checkout-btn" onclick="openCheckoutModal()">
        Confirmar Pedido
      </button>

      <div *ngIf="!isAuthenticated" style="text-align:center; padding:14px 10px; border-radius:12px; border:1px solid rgba(243,125,21,0.2); background:rgba(243,125,21,0.06); margin-bottom:12px;">
        <p style="font-size:13px; color:#f37d15; font-weight:600; margin:0 0 10px 0;">Para realizar un pedido necesitás una cuenta.</p>
        <div style="display:flex; gap:8px; justify-content:center;">
          <a href="login" class="checkout-btn" style="text-decoration:none; font-size:13px; padding:10px 16px;">Iniciar Sesión</a>
          <a href="registro" class="checkout-btn-secondary" style="text-decoration:none; font-size:13px; padding:10px 16px; border:1px solid #334155; color:#e2e8f0;">Crear Cuenta</a>
        </div>
      </div>

    </form>
  </div>
</div>

<div id="checkout-overlay" class="checkout-overlay" style="display:none;" onclick="closeCheckoutModal()"></div>

<div id="checkout-modal" class="checkout-modal" style="display:none;">
  <div class="checkout-modal-content">
    <div class="checkout-modal-header">
      <div>
        <h3>Confirmar pedido</h3>
        <p>Ingresa los datos para finalizar tu compra.</p>
      </div>
      <button type="button" onclick="closeCheckoutModal()" class="checkout-modal-close">&times;</button>
    </div>

    <div id="checkout-error" class="checkout-error hidden">
      Completa todos los campos obligatorios antes de continuar.
    </div>

    <div class="checkout-modal-body">
      <!-- <div class="checkout-field" id="checkout-name-group">
        <label for="checkout_name">Nombre completo</label>
        <input id="checkout_name" type="text" 
        
        placeholder="Ej. Juan Pérez" class="checkout-input" />
      </div> -->

      <!-- <div class="checkout-field" id="checkout-phone-group">
        <label for="checkout_phone">Teléfono de contacto</label>
        <input id="checkout_phone" type="tel" placeholder="Ej. 3001234567" class="checkout-input" />
      </div> -->

      <div id="checkout-address-badge" style="display:none; align-items:center; gap:8px; margin-bottom:12px; padding:10px 14px; background:rgba(243,125,21,0.08); border:1px solid rgba(243,125,21,0.2); border-radius:12px; font-size:13px; font-weight:600; color:#f37d15;">
        <i class="fas fa-map-marker-alt" style="color:#f37d15;"></i>
        <span>Usando tu dirección guardada</span>
      </div>

      <div class="checkout-field">
        <label for="checkout_calle">Dirección — Calle</label>
        <input id="checkout_calle" type="text" placeholder="Ej. Calle 123 #45-67" class="checkout-input" />
      </div>

      <div class="checkout-row-duo">
        <div class="checkout-field">
          <label for="checkout_ciudad">Ciudad</label>
          <input id="checkout_ciudad" type="text" 
          onkeypress="return contrasena(event)"
          placeholder="Ej. Bogotá" class="checkout-input" list="ciudades-colombia" />
        </div>
        <div class="checkout-field" style="opacity:0.5; pointer-events:none;">
          <label for="checkout_pais">País</label>
          <input id="checkout_pais" type="text" value="Colombia" class="checkout-input" readonly />
        </div>
      </div>

      <div class="checkout-field">
        <label for="checkout_barrio">Barrio <span style="color:#94a3b8;font-weight:400;font-size:0.8em;">(opcional)</span></label>
        <input id="checkout_barrio" type="text"
        onkeypress="return contrasena(event)" 
        placeholder="Ej. Chapinero" class="checkout-input" />
      </div>

      <div class="checkout-field">
        <label for="checkout_notes">Notas del pedido</label>
        <textarea id="checkout_notes" placeholder="Opcional" 
        onkeypress="return contrasena(event)"
        rows="3" class="checkout-input"></textarea>
      </div>
    </div>

    <datalist id="ciudades-colombia">

      <option value="Bogotá"></option>

      <option value="Manizales"></option>

      <option value="Montería"></option>

      <option value="Palmira"></option>
      <option value="Pasto"></option>
      <option value="Pereira"></option>
      <option value="Popayán"></option>

    </datalist>

    <div class="checkout-modal-actions">
      <button type="button" onclick="closeCheckoutModal()" class="checkout-btn-secondary">Cancelar</button>
      <button type="button" onclick="submitCheckoutForm()" class="checkout-btn-primary">Enviar pedido</button>
    </div>
  </div>
</div>
