<div class="container">
  <h2>Productos</h2>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <!-- ACCIONES -->
  <div class="form-linear">
    <button (click)="crearProducto()" class="btn-link">
      Crear nuevo producto
    </button>

    <button (click)="Auditoria()" class="btn-link">
      Auditoría
    </button>
  </div>

  <!-- BUSQUEDA -->
  <form [formGroup]="form" (ngSubmit)="buscar()" style="margin-top:1rem;">
    <input formControlName="search" placeholder="Buscar producto">
    <button type="submit">Buscar</button>
  </form>

  <!-- LOADING -->
  <div *ngIf="isLoading">Cargando productos...</div>

  <!-- LISTA -->
  <div *ngIf="!isLoading">

    <ul *ngIf="productos.length > 0">
      <li *ngFor="let producto of productos">

        <span class="btn-link2">
          {{ producto.prod_nombre }}
        </span>

        <a (click)="editarProducto(producto)" class="btn-link">
          Editar
        </a>

        <a (click)="confirmarEliminar(producto)" class="btn-link">
          Eliminar
        </a>

      </li>
    </ul>

    <p *ngIf="productos.length === 0">
      No se encontraron productos.
    </p>

    <!-- PAGINACION -->
    <div style="margin-top: 1rem;">
      <button (click)="anterior()" [disabled]="page === 1">Anterior</button>
      <span>Página {{ page }}</span>
      <button (click)="siguiente()">Siguiente</button>
    </div>

  </div>
</div>

<!-- MODAL -->
<div *ngIf="showDeleteModal" class="modal-overlay">
  <div class="modal-content">
    <h3>Eliminar Producto</h3>

    <p *ngIf="productoToDelete">
      ¿Eliminar "{{ productoToDelete.prod_nombre }}"?
    </p>

    <div class="form-linear form-center">
      <button (click)="eliminarProducto()" [disabled]="isLoading">
        {{ isLoading ? 'Eliminando...' : 'Sí, eliminar' }}
      </button>

      <button (click)="cancelarEliminar()">
        Cancelar
      </button>
    </div>
  </div>
</div>
