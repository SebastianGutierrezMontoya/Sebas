<!-- Modal de confirmación de eliminación -->
<div class="modal" tabindex="-1" [ngClass]="{'show': showModal}" style="display: block;" *ngIf="showModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirmar eliminación</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro de que deseas eliminar el perfil "{{ perfilToDelete?.nombre }}"?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
          <button type="button" class="btn btn-danger" (click)="eliminarPerfil()">Eliminar</button>
        </div>
      </div>
    </div> 
</div>




<div class="panel-content-header">
    <div><h2>Perfiles</h2><p>Gestión de perfiles y permisos.</p></div>
    <div class="panel-actions">
        <button class="panel-btn panel-btn-primary" (click)="crearPerfil()">+ Nuevo Perfil</button>
        <!-- <a href="admin_home" class="panel-btn panel-btn-secondary">↩️ Admin Clásico</a> -->
    </div>
</div>

<div *ngIf="perfiles.length > 0" class="panel-table-wrapper">
    <table class="panel-table">
        <thead><tr><th>ID</th><th>Nombre</th><th>Rol</th><th>Descripción</th><th>Acciones</th></tr></thead>
        <tbody>
            <tr *ngFor="let p of perfiles">
                <td style="color:#64748b; font-family:monospace;">{{ p.id_perfil }}</td>
                <td style="color:#ffffff; font-weight:600;">{{ p.nombre }}</td>
                <td>{{ p.rol_id }}</td>
                <td>{{ p.descripcion }}</td>
                <td>
                    <a href="perfiles/form/{{ p.id_perfil }}" class="panel-btn panel-btn-primary panel-btn-sm">Editar</a>
                    <button (click)="gestionarPermisos(p.id_perfil)" class="panel-btn panel-btn-secondary panel-btn-sm">Permisos</button>
                </td>
            </tr>

        </tbody>
    </table>
</div>
<div *ngIf="perfiles.length === 0" class="panel-alert panel-alert-info">No hay perfiles.</div>
