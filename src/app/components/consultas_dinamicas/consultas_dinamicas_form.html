<form [formGroup]="form" (ngSubmit)="guardar()" class="form-container">
  <h2 class="form-header">Crear Consulta Dinámica</h2>

  <div class="form-floating">
    <input formControlName="cons_id" type="number" class="form-control" placeholder=" " id="id_cons_id">
    <label for="id_cons_id">Cons id</label>
  </div>

  <div class="form-floating">
    <input formControlName="cons_nombre" type="text" maxlength="50" class="form-control" placeholder=" " id="id_cons_nombre">
    <label for="id_cons_nombre">Cons nombre</label>
  </div>

  <div class="form-floating">
    <input formControlName="cons_descripcion" type="text" maxlength="200" class="form-control" placeholder=" " id="id_cons_descripcion">
    <label for="id_cons_descripcion">Cons descripcion</label>
  </div>

  <div class="form-floating">
    <textarea formControlName="cons_sql" cols="40" rows="10" maxlength="4000" class="form-control" placeholder=" " id="id_cons_sql"></textarea>
    <label for="id_cons_sql">Cons sql</label>
  </div>

  <div class="form-linear form-center">
    <button type="submit">Guardar</button>
    <a (click)="volver()" class="btn-link">Volver al listado</a>
  </div>
</form>
