<div id="login-page-body">
    <div class="login-card">
        <div class="login-logo">
            <img [src]="logoPath" alt="Logo">
        </div>
        <h2 class="login-title">Acceso Multiverso</h2>


        <div *ngIf="errorMessage" style="margin-bottom: 20px;">
            {{ errorMessage }}
        </div>

        
        <form  [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="off">

            <input type="text" name="usuario" 
            class="form-input" placeholder="Usuario" required
            formControlName="id_usuario"
            [class.is-invalid]="loginForm.get('id_usuario')?.invalid && loginForm.get('id_usuario')?.touched"
            />
            <input type="password" name="contraseña" 
            class="form-input" placeholder="Contraseña" required
            formControlName="password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            />
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        
        <p style="text-align:center; margin-top:20px; font-size:13px; color:#6b7280;">
            ¿No tienes cuenta? <a href="#" (click)="goToRegistro(); $event.preventDefault()" style="color:#f37d15; text-decoration:none; font-weight:700;">Regístrate</a>
        </p>
    </div>
</div>
