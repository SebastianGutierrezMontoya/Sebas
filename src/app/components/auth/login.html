<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg" style="width: 100%; max-width: 400px;">
    <div class="card-body p-5">
      <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>

      <!-- Mensaje de error -->
      <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ errorMessage }}
        <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
      </div>

      <!-- Formulario -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Usuario -->
        <div class="mb-3">
          <label for="id_usuario" class="form-label">Usuario</label>
          <input 
            type="text" 
            class="form-control" 
            id="id_usuario"
            formControlName="id_usuario"
            placeholder="Ingresa tu usuario"
            [class.is-invalid]="loginForm.get('id_usuario')?.invalid && loginForm.get('id_usuario')?.touched"
          />
          <div class="invalid-feedback" *ngIf="loginForm.get('id_usuario')?.invalid && loginForm.get('id_usuario')?.touched">
            El usuario es requerido
          </div>
        </div>

        <!-- Contraseña -->
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-group">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              class="form-control" 
              id="password"
              formControlName="password"
              placeholder="Ingresa tu contraseña"
              [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            />
            <button 
              class="btn btn-outline-secondary" 
              type="button"
              (click)="togglePasswordVisibility()"
            >
              <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
          <div class="invalid-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es requerida</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">La contraseña debe tener mínimo 6 caracteres</span>
          </div>
        </div>

        <!-- Botón Submit -->
        <button 
          type="submit" 
          class="btn btn-primary w-100 mb-3"
          [disabled]="isLoading || loginForm.invalid"
        >
          <span *ngIf="!isLoading">Iniciar Sesión</span>
          <span *ngIf="isLoading">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Iniciando...
          </span>
        </button>
      </form>

      <!-- Enlace a registro -->
      <p class="text-center mb-0">
        ¿No tienes cuenta? 
        <a href="#" (click)="goToRegistro(); $event.preventDefault()" class="text-decoration-none">
          Regístrate aquí
        </a>
      </p>
    </div>
  </div>
</div>
