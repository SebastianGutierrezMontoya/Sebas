
  

  <!-- Formulario reactivo -->
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
    <h2 class="form-header">
    <!-- {% if isEditMode %}Editar{% else %}Crear{% endif %} Categoría -->
    {{ isEditMode ? 'Editar' : 'Crear' }} Categoría
  </h2>

  <!-- Mostrar mensaje de error si existe -->
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>
    <!-- Campo: Cat nombre -->
    <div class="form-floating">
      <input 
        type="text" 
        formControlName="cat_nombre"
        maxlength="50" 
        class="form-control" 
        placeholder=" " 
        id="cat_nombre"
        [class.is-invalid]="cat_nombre && cat_nombre.invalid && cat_nombre.touched"
      >
      <label for="cat_nombre">Cat nombre</label>
      <div *ngIf="cat_nombre && cat_nombre.invalid && cat_nombre.touched" class="invalid-feedback">
        <small *ngIf="cat_nombre.errors?.['required']">Este campo es requerido</small>
        <small *ngIf="cat_nombre.errors?.['maxlength']">Máximo 50 caracteres</small>
      </div>
    </div>

    <!-- Campo: Cat descripción -->
    <div class="form-floating">
      <input 
        type="text" 
        formControlName="cat_descripcion"
        maxlength="200" 
        class="form-control" 
        placeholder=" " 
        id="cat_descripcion"
        [class.is-invalid]="cat_descripcion && cat_descripcion.invalid && cat_descripcion.touched"
      >
      <label for="cat_descripcion">Cat descripcion</label>
      <div *ngIf="cat_descripcion && cat_descripcion.invalid && cat_descripcion.touched" class="invalid-feedback">
        <small *ngIf="cat_descripcion.errors?.['maxlength']">Máximo 200 caracteres</small>
      </div>
    </div>

    <!-- Botones de acción -->
    <div class="form-linear form-center">
      <button 
        type="submit" 
        [disabled]="!form.valid || isLoading"
        class="btn btn-primary"
      >
        {{ isLoading ? 'Guardando...' : 'Guardar' }}
      </button>
      <button 
        type="button" 
        (click)="volver()"
        [disabled]="isLoading"
        class="btn-link"
      >
        Volver al listado
      </button>
    </div>
  </form>
