<div class="container">
  <h2>Categorías</h2>

  <!-- Mostrar mensaje de error si existe -->
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <!-- Botón para crear nueva categoría -->
  <button (click)="crearCategoria()" class="btn-link">Crear nueva categoría</button>

  <!-- Indicador de carga -->
  <div *ngIf="isLoading" class="loading">
    Cargando categorías...
  </div>

  <!-- Lista de categorías -->
  <div *ngIf="!isLoading">
    <!-- <p>"categorias.length" = {{ categorias.length }}</p>
    <pre *ngIf="categorias.length > 0">{{ categorias | json }}</pre> -->

    <ul *ngIf="categorias.length > 0">  
      <li *ngFor="let categoria of categorias">
        <a class="btn-link2">{{ categoria.cat_nombre }}</a>
        <a (click)="editarCategoria(categoria)" class="btn-link">Editar</a>,
        <a (click)="confirmarEliminar(categoria); $event.preventDefault()" class="btn-link">Eliminar</a>
      </li>
    </ul>

    <!-- Mensaje si no hay categorías -->
    <p *ngIf="categorias.length === 0">
      No hay categorías disponibles.
    </p>
  </div>
</div>

<!-- Modal de confirmación de borrado -->
<div *ngIf="showDeleteModal" class="modal-overlay">
  <div class="modal-content">
    <h3>Eliminar Categoría</h3>
    <p *ngIf="categoriaToDelete">
      ¿Estás seguro de que deseas eliminar "{{ categoriaToDelete.cat_nombre }}"?
    </p>
    <div class="form-linear form-center">
      <button (click)="eliminarCategoria()" [disabled]="isLoading" class="btn btn-danger">
        {{ isLoading ? 'Eliminando...' : 'Sí, eliminar' }}
      </button>
      <button (click)="cancelarEliminar()" [disabled]="isLoading" class="btn btn-secondary">
        Cancelar
      </button>
    </div>
  </div>
</div>
