

<!-- Modal de confirmación de borrado -->
<div *ngIf="showDeleteModal" class="modal-overlay">
  <div class="modal-content">
    <h3>Eliminar Categoría</h3>
    <p *ngIf="categoriaToDelete">
      ¿Estás seguro de que deseas eliminar "{{ categoriaToDelete.cat_nombre }}"?
    </p>
    <div class="form-linear form-center">
      <button (click)="eliminarCategoria()" [disabled]="isLoading" class="btn btn-danger">
        {{ isLoading ? 'Eliminando...' : 'Sí, eliminar' }}
      </button>
      <button (click)="cancelarEliminar()" [disabled]="isLoading" class="btn btn-secondary">
        Cancelar
      </button>
    </div>
  </div>
</div>
             <!-- <a href="#" onclick="showDeleteModal('ROA', 'Ropa y Accesorios'); return false;" class="btn-link">Eliminar</a>) -->



<div class="panel-content-header">
    <div><h2>Categorías</h2><p>Gestión de categorías de productos.</p></div>
    <div class="panel-actions">
        <button (click)="crearCategoria()" class="panel-btn panel-btn-secondary">Crear Categoria</button>
    </div>
</div>

<div *ngIf="categorias.length > 0" class="panel-table-wrapper">
    <table class="panel-table">
        <thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
        <tbody>

            <tr *ngFor="let c of categorias">
                <td style="color:#64748b; font-family:monospace;">{{ c.cat_id }}</td>
                <td style="color:#ffffff; font-weight:600;">{{ c.cat_nombre }}</td>
                <td>{{ c.cat_descripcion }}</td>
                <td>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <a href="categorias/form/{{ c.cat_id }}" class="panel-btn panel-btn-primary panel-btn-sm">Editar</a>
                        <!-- <a (click)="confirmarEliminar(c)" class="panel-btn panel-btn-danger panel-btn-sm">Eliminar</a> -->
                    </div>
                </td>
            </tr>

        </tbody>
    </table>
</div>
<div *ngIf="categorias.length === 0" class="panel-alert panel-alert-info">No hay categorías.</div>
