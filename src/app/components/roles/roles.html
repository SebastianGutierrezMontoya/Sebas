<div *ngIf="showDeleteModal" class="modal">
  <div class="modal-content">
    <h3>Confirmar eliminación</h3>
    <p>¿Está seguro que desea eliminar el rol "{{ roleToDelete?.nombre }}"?</p>
    <button (click)="eliminarRol()">Sí, eliminar</button>
    <button (click)="cancelarEliminarRol()">Cancelar</button>
  </div>
</div>

<div class="panel-content-header">
    <div><h2>Roles</h2><p>Gestión de roles del sistema.</p></div>
    <div class="panel-actions">
        <a href="roles/form" class="panel-btn panel-btn-primary">+ Nuevo Rol</a>
        <!-- <a href="admin_home" class="panel-btn panel-btn-secondary">↩️ Admin Clásico</a> -->
    </div>
</div>

<div *ngIf="roles.length > 0" class="panel-table-wrapper">
    <table class="panel-table">
        <thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
        <tbody>

            <tr *ngFor="let r of roles">
                <td style="color:#64748b; font-family:monospace;">{{ r.id_rol }}</td>
                <td style="color:#ffffff; font-weight:600;">{{ r.nombre }}</td>
                <td>{{ r.descripcion }}</td>
                <td>
                    <a href="roles/form/{{ r.id_rol }}" class="panel-btn panel-btn-sm panel-btn-primary">Editar</a>
                    <a (click)="confirmarEliminarRol(r)" class="panel-btn panel-btn-sm panel-btn-danger">Eliminar</a>
                </td>
            </tr>

        </tbody>
    </table>
</div>
<div *ngIf="roles.length === 0" class="panel-alert panel-alert-info">No hay roles.</div>
